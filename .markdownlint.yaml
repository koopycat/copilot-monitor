# markdownlint configuration

# Project uses sentence-per-line convention — disable line-length rule
MD013: false

# Allow inline HTML (needed for docs/index.html and other rich content)
MD033: false

# Allow duplicate headings in different sections
MD024:
  siblings_only: true

# Allow bare URLs (used in Markdown references)
MD034: false

# First line should be a top-level heading
MD041: true

# Single top-level heading
MD025: true

# Trailing punctuation in headings is allowed (specs/docs use question marks etc.)
MD026: false

# Ordered list item prefix — project uses explicit numbers (1, 2, 3...)
MD029:
  style: ordered

# Table column style — disabled; project separator rows use no-space format
# while data rows use spaces, which is valid Markdown in practice
MD060: false

# Code fence style
MD048:
  style: backtick

# Allow emphasis-as-heading (used in docs for sub-headings like **Bold Text**)
MD036: false

# Code block style — disabled because MD048 already enforces backtick fences
MD046: false
