name: Bug report
description: Report a bug or unexpected behavior in copilot-monitor
title: '[Bug] '
labels: ['bug']
assignees:
  - koopycat
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report! Please fill out the sections below to help us reproduce and fix the issue.
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear, concise description of the bug.
      placeholder: 'e.g., The dashboard hangs when viewing the /sessions page with more than 10,000 entries.'
    validations:
      required: true
  - type: textarea
    id: steps-to-reproduce
    attributes:
      label: Steps to reproduce
      description: |
        What commands or interactions trigger the bug? Be as specific as possible so we can reproduce it.

        Example:
        1. Start the proxy: `copilot-monitor run --db ./test.db`
        2. Send 5000 API calls through the proxy on port 7733
        3. Open the dashboard at http://localhost:7734
        4. Click on "Sessions" in the sidebar
      placeholder: "1.\n2.\n3.\n..."
    validations:
      required: true
  - type: textarea
    id: expected-behavior
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
      placeholder: 'e.g., The sessions page should load within 2 seconds and display all sessions.'
    validations:
      required: true
  - type: textarea
    id: actual-behavior
    attributes:
      label: Actual behavior
      description: What actually happened? Include error messages and stack traces if available.
      placeholder: 'e.g., The page spins indefinitely and the browser console shows a 504 Gateway Timeout error.'
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: |
        Provide details about your setup.

        - **OS:** (e.g., macOS 15.0, Ubuntu 24.04, Windows 11)
        - **copilot-monitor version:** (run `copilot-monitor version`)
        - **Go version** (if built from source): (run `go version`)
        - **Install method:** (Homebrew, `go install`, prebuilt binary, built from source)
      placeholder: "- OS: macOS 15.0\n- copilot-monitor version: v0.3.1\n- Go version: go1.26.5\n- Install method: go install"
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: |
        If applicable, paste relevant terminal output, log excerpts, or screenshots.
        Tip: You can drag and drop images into this field.
      placeholder: 'Paste logs or attach screenshots here...'
    validations:
      required: false
  - type: textarea
    id: additional-context
    attributes:
      label: Additional context
      description: Anything else you'd like to add? Related issues, workarounds you've tried, etc.
      placeholder: 'e.g., This only happens when the --routes-config flag is used...'
    validations:
      required: false
