name: ci

on:
  push:
  pull_request:
  schedule:
    - cron: '0 6 * * 1'  # weekly Monday 6am UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  go:
    name: go-checks
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.5'
          check-latest: true
      - uses: pnpm/action-setup@v6
        with:
          version: latest
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm
          cache-dependency-path: dashboard/pnpm-lock.yaml
      - name: Build dashboard
        run: cd dashboard && pnpm install --frozen-lockfile && pnpm build
      - name: Go checks
        run: |
          go mod tidy -diff
          go vet ./...
          go run honnef.co/go/tools/cmd/staticcheck@v0.7.0 ./...
          go run golang.org/x/vuln/cmd/govulncheck@v1.5.0 ./...
          go test ./...
        shell: bash

  trufflehog:
    name: trufflehog-verified
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: TruffleHog full-history verified scan
        run: |
          docker run --rm -v "$PWD:/pwd" ghcr.io/trufflesecurity/trufflehog:latest \
            git file:///pwd --only-verified --fail
