name: ci

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'openspec/**'
      - 'plans/**'
      - 'PRODUCT.md'
  pull_request:
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'openspec/**'
      - 'plans/**'
      - 'PRODUCT.md'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v7
        with:
          go-version: '1.26.5'
          check-latest: true
          cache: true
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v7
        with:
          node-version: '24'
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - name: Install dashboard dependencies
        run: cd dashboard && pnpm install --frozen-lockfile
      # "nodashboard" stubs out the embedded frontend (dashboard/embed_stub.go)
      # so Go tooling compiles without first building the Vite bundle. The
      # release workflow builds the dashboard and uses the real embed.
      - name: Ensure tidy go.mod
        run: go mod tidy -diff
      - name: Build
        run: go build -tags nodashboard ./...
      - name: Vet
        run: go vet -tags nodashboard ./...
      - name: Staticcheck
        run: go run honnef.co/go/tools/cmd/staticcheck@v0.7.0 -tags nodashboard ./...
      - name: Dashboard svelte-check
        run: cd dashboard && pnpm check

  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v7
        with:
          go-version: '1.26.5'
          check-latest: true
          cache: true
      # No Node/pnpm or frontend build needed: no Go test references the
      # embedded dashboard assets, and -tags nodashboard stubs out the embed.
      - name: Test
        run: go test -race -count=1 -timeout 120s -tags nodashboard ./...
