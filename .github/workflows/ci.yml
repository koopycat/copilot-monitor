name: ci

on:
  push:
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'specs/**'
      - 'plans/**'
      - 'PRODUCT.md'
  pull_request:
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'specs/**'
      - 'plans/**'
      - 'PRODUCT.md'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26.5'
          check-latest: true
          cache: true
      # "nodashboard" stubs out the embedded frontend (dashboard/embed_stub.go)
      # so Go tooling compiles without first building the Vite bundle. The
      # release workflow builds the dashboard and uses the real embed.
      - name: Ensure tidy go.mod
        run: go mod tidy -diff
      - name: Build
        run: go build -tags nodashboard ./...
      - name: Vet
        run: go vet -tags nodashboard ./...
      - name: Staticcheck
        run: go run honnef.co/go/tools/cmd/staticcheck@v0.7.0 -tags nodashboard ./...

  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26.5'
          check-latest: true
          cache: true
      # No Node/pnpm or frontend build needed: no Go test references the
      # embedded dashboard assets, and -tags nodashboard stubs out the embed.
      - name: Test
        run: go test -race -count=1 -timeout 120s -tags nodashboard ./...

  e2e:
    name: e2e
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26.5'
          check-latest: true
          cache: true
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - uses: pnpm/action-setup@v4
        with:
          version: '10.17.1'
          run_install: false
      - name: Install dashboard deps
        working-directory: dashboard
        run: pnpm install --frozen-lockfile
      - name: Build dashboard
        working-directory: dashboard
        run: pnpm build
      - name: Install e2e deps
        working-directory: internal/e2e
        run: pnpm install --frozen-lockfile
      - name: Install Playwright browsers
        working-directory: internal/e2e
        run: pnpm playwright install --with-deps chromium
      - name: Download Go modules
        run: go mod download
      - name: Run e2e tests
        working-directory: internal/e2e
        run: pnpm test
