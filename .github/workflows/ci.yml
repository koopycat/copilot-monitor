name: ci

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  go:
    name: go-checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.4'
          check-latest: true
      - name: Go checks
        run: |
          go mod tidy -diff
          go vet ./...
          go run honnef.co/go/tools/cmd/staticcheck@v0.7.0 ./...
          go run golang.org/x/vuln/cmd/govulncheck@v1.5.0 ./...
          go test ./...
        shell: bash
