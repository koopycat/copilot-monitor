name: ci

on:
  push:
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "specs/**"
      - "plans/**"
      - "PRODUCT.md"
  pull_request:
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "specs/**"
      - "plans/**"
      - "PRODUCT.md"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.5"
          check-latest: true
          cache: true
      - name: Ensure tidy go.mod
        run: go mod tidy -diff
      - name: Build
        run: go build ./...
      - name: Vet
        run: go vet ./...
      - name: Staticcheck
        run: go run honnef.co/go/tools/cmd/staticcheck@v0.7.0 ./...

  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.5"
          check-latest: true
          cache: true
      - uses: pnpm/action-setup@v6
        with:
          version: latest
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: dashboard/pnpm-lock.yaml
      - name: Build dashboard
        run: cd dashboard && pnpm install --frozen-lockfile && pnpm build
      - name: Test
        run: go test -race -count=1 -timeout 120s ./...
