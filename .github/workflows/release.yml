name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: build-${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux-amd64
            goos: linux
            goarch: amd64
            archive: tar.gz
            binary: copilot-monitor
          - target: linux-arm64
            goos: linux
            goarch: arm64
            archive: tar.gz
            binary: copilot-monitor
          - target: darwin-amd64
            goos: darwin
            goarch: amd64
            archive: tar.gz
            binary: copilot-monitor
          - target: darwin-arm64
            goos: darwin
            goarch: arm64
            archive: tar.gz
            binary: copilot-monitor
          - target: windows-amd64
            goos: windows
            goarch: amd64
            archive: zip
            binary: copilot-monitor.exe
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26.5'
          check-latest: true
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - name: Build dashboard
        run: cd dashboard && pnpm install --frozen-lockfile && pnpm build
      - name: Verify
        run: |
          go vet ./...
          go test ./...
        shell: bash
      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          mkdir -p dist
          go build -trimpath -ldflags="-s -w -X copilot-monitoring/internal/cli.version=${{ github.ref_name }}" -o "dist/${{ matrix.binary }}" ./cmd/copilot-monitor
      - name: Archive
        shell: bash
        run: |
          cp README.md dist/README.md
          if [ "${{ matrix.archive }}" = "tar.gz" ]; then
            tar -C dist -czf "dist/copilot-monitor-${{ matrix.target }}.tar.gz" "${{ matrix.binary }}" README.md
          else
            (cd dist && zip -q "copilot-monitor-${{ matrix.target }}.zip" "${{ matrix.binary }}" README.md)
          fi
      - name: Upload
        uses: softprops/action-gh-release@v3
        with:
          files: dist/copilot-monitor-${{ matrix.target }}.${{ matrix.archive }}
          generate_release_notes: true
          fail_on_unmatched_files: true

  homebrew:
    name: update homebrew formula
    runs-on: ubuntu-latest
    needs: build
    permissions: {}
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v7
        with:
          repository: koopycat/homebrew-copilot-monitor
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: tap
      - name: Download release assets and compute SHA256s
        run: |
          set -euo pipefail
          TAG="${{ github.ref_name }}"
          REPO="${{ github.repository }}"
          BASE="https://github.com/$REPO/releases/download/$TAG"

          # Download tarballs (Apple Silicon macOS only, no Intel macOS in Homebrew)
          targets="darwin-arm64 linux-amd64 linux-arm64"
          for target in $targets; do
            curl -fsSL --retry 3 "$BASE/copilot-monitor-$target.tar.gz" -o "$target.tar.gz"
          done

          # Ensure tap directory exists
          mkdir -p tap/Formula

          # Generate formula. Single-quoted heredoc ('RUBY') disables shell
          # expansion — $VERSION and #{bin} survive verbatim into the Ruby file.
          cat > tap/Formula/copilot-monitor.rb << 'RUBY'
          class CopilotMonitor < Formula
            desc "Local proxy for LLM API usage monitoring"
            homepage "https://github.com/koopycat/copilot-monitor"
            license "MIT"
            version "VERSION"

            on_macos do
              on_arm do
                url "https://github.com/koopycat/copilot-monitor/releases/download/vVERSION/copilot-monitor-darwin-arm64.tar.gz"
                sha256 "DARWIN_ARM64_SHA256"
              end
            end

            on_linux do
              on_arm do
                url "https://github.com/koopycat/copilot-monitor/releases/download/vVERSION/copilot-monitor-linux-arm64.tar.gz"
                sha256 "LINUX_ARM64_SHA256"
              end
              on_intel do
                url "https://github.com/koopycat/copilot-monitor/releases/download/vVERSION/copilot-monitor-linux-amd64.tar.gz"
                sha256 "LINUX_AMD64_SHA256"
              end
            end

            def install
              bin.install "copilot-monitor"
            end

            test do
              system "#{bin}/copilot-monitor", "version"
            end
          end
          RUBY

          V="${TAG#v}"
          sed -i "s/VERSION/$V/g" tap/Formula/copilot-monitor.rb
          sed -i "s/DARWIN_ARM64_SHA256/$(sha256sum darwin-arm64.tar.gz | cut -d' ' -f1)/" tap/Formula/copilot-monitor.rb
          sed -i "s/LINUX_ARM64_SHA256/$(sha256sum linux-arm64.tar.gz | cut -d' ' -f1)/" tap/Formula/copilot-monitor.rb
          sed -i "s/LINUX_AMD64_SHA256/$(sha256sum linux-amd64.tar.gz | cut -d' ' -f1)/" tap/Formula/copilot-monitor.rb
      - name: Validate formula
        run: |
          ruby -c tap/Formula/copilot-monitor.rb || {
            echo "Formula has Ruby syntax errors"
            exit 1
          }
          if grep -nE 'VERSION|DARWIN_ARM64_SHA256|LINUX_ARM64_SHA256|LINUX_AMD64_SHA256' \
            tap/Formula/copilot-monitor.rb; then
            echo "Unreplaced placeholder found in formula"
            exit 1
          fi
      - name: Commit and push formula
        working-directory: tap
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/copilot-monitor.rb
          if git diff --staged --quiet; then
            echo "Formula unchanged, skipping commit."
          else
            git commit -m "copilot-monitor ${{ github.ref_name }}"
            git push
          fi
