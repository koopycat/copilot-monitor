repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
      - id: mixed-line-ending
        args: [--fix=lf]

  - repo: local
    hooks:
      - id: go-fmt
        name: go fmt
        entry: gofmt -l -w
        language: system
        types: [go]
      - id: go-imports
        name: go imports
        entry: bash -c 'go run golang.org/x/tools/cmd/goimports@latest -l -w "$@"' --
        language: system
        types: [go]
      - id: go-mod-tidy
        name: go mod tidy
        entry: go mod tidy -diff
        language: system
        files: ^(go\.mod|go\.sum|\.go)$
        pass_filenames: false
      - id: go-vet
        name: go vet
        entry: go vet ./...
        language: system
        types: [go]
        pass_filenames: false
      - id: dashboard-check
        name: dashboard svelte-check
        entry: bash -c 'cd dashboard && pnpm check'
        language: system
        files: ^dashboard/.*\.(svelte|ts|js)$
        pass_filenames: false
      - id: e2e-eslint
        name: e2e eslint
        entry: bash -c 'cd internal/e2e && pnpm lint'
        language: system
        files: ^internal/e2e/.*\.(js|json)$
        pass_filenames: false
