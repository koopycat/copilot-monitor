<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Copilot Monitor</title>
<style>
  * { box-sizing: border-box; }
  body { font-family: system-ui, sans-serif; margin: 2rem; background: #0d1117; color: #c9d1d9; }
  h1 { font-size: 1.5rem; margin-bottom: 0.5rem; }
  .subtitle { font-size: 0.8rem; color: #8b949e; margin-bottom: 1.5rem; }
  h2 { font-size: 1rem; color: #8b949e; margin: 2rem 0 0.5rem; }
  .grid { display: grid; grid-template-columns: 1fr; gap: 1.5rem; }
  @media (min-width: 900px) { .grid { grid-template-columns: 1fr 1fr; } }
  table { width: 100%; border-collapse: collapse; margin-bottom: 1rem; font-size: 0.8rem; }
  th, td { padding: 0.4rem 0.6rem; text-align: right; border-bottom: 1px solid #21262d; white-space: nowrap; }
  th:first-child, td:first-child { text-align: left; }
  th { color: #8b949e; font-weight: 500; font-size: 0.75rem; }
  tr:hover td { background: #161b22; }
  .cost-total { font-size: 2.5rem; font-weight: 600; color: #58a6ff; line-height: 1.2; }
  .cost-projected { font-size: 1rem; color: #8b949e; }
  .chart-wrap { position: relative; width: 100%; overflow-x: auto; margin-bottom: 1rem; }
  canvas { display: block; }
  .legend { display: flex; gap: 1rem; flex-wrap: wrap; font-size: 0.75rem; margin-top: 0.5rem; color: #8b949e; }
  .legend span { display: inline-block; width: 10px; height: 10px; border-radius: 2px; margin-right: 4px; vertical-align: middle; }
  .footer { margin-top: 3rem; font-size: 0.7rem; color: #484f58; text-align: center; }
  .error { color: #f85149; padding: 1rem; border: 1px solid #f8514933; border-radius: 6px; }
  .tag { font-size: 0.65rem; padding: 1px 5px; border-radius: 3px; background: #21262d; }
  .tag.fb { background: #3d2e00; color: #d29922; }
  .tag.nb { background: #1b2b34; color: #8b949e; }
  .num { font-variant-numeric: tabular-nums; }
</style>
</head>
<body>
<h1>Copilot Monitor</h1>
<div class="subtitle" id="updated"></div>

<div class="grid">
  <div>
    <div class="cost-total" id="cost-value">—</div>
    <div class="cost-projected" id="cost-projected"></div>
  </div>
  <div id="latency-summary"></div>
</div>

<h2>Daily Usage</h2>
<div class="chart-wrap">
  <canvas id="chart"></canvas>
</div>
<div class="legend" id="chart-legend"></div>

<h2>Models</h2>
<table id="stats-table"><thead><tr><th>Model</th><th>Requests</th><th>Input</th><th>Cached</th><th>Write</th><th>Output</th><th>Total</th><th>Latency</th></tr></thead><tbody></tbody></table>

<h2>Cost Breakdown</h2>
<table id="cost-table"><thead><tr><th>Model</th><th>Input $</th><th>Cached $</th><th>Write $</th><th>Output $</th><th>Total $</th></tr></thead><tbody></tbody></table>

<h2>Recent Sessions</h2>
<table id="sessions-table"><thead><tr><th>Start</th><th>Duration</th><th>Project</th><th>Requests</th><th>Tokens</th><th>Cost</th></tr></thead><tbody></tbody></table>

<p class="footer">Estimated AI-credit list-price cost. Not your GitHub Copilot bill. Auto-refreshes every 30s.</p>

<script>
const COLORS = ['#58a6ff','#3fb950','#d29922','#f85149','#bc8cff','#79c0ff','#56d364'];
const modelColors = {};

function modelColor(model, idx) {
  if (!modelColors[model]) modelColors[model] = COLORS[idx % COLORS.length];
  return modelColors[model];
}

async function fetchJSON(url) {
  const resp = await fetch(url);
  if (!resp.ok) throw new Error(resp.status + ' ' + url);
  return resp.json();
}

function fmtUSD(n) { return n < 0.01 ? '<0.01' : n.toFixed(2); }
function fmtMs(n) { return n < 1 ? '<1ms' : n < 1000 ? Math.round(n) + 'ms' : (n/1000).toFixed(1) + 's'; }
function fmtDur(s) { return s < 60 ? s + 's' : Math.round(s/60) + 'm'; }

function drawChart(canvas, data) {
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  const w = canvas.parentElement.clientWidth - 16;
  const h = 200;
  canvas.width = w * dpr;
  canvas.height = h * dpr;
  canvas.style.width = w + 'px';
  canvas.style.height = h + 'px';
  ctx.scale(dpr, dpr);
  ctx.clearRect(0, 0, w, h);

  if (!data || data.length === 0) {
    ctx.fillStyle = '#484f58';
    ctx.font = '0.8rem system-ui';
    ctx.textAlign = 'center';
    ctx.fillText('No data yet', w/2, h/2);
    return;
  }

  const dates = [...new Set(data.map(d => d.date))].sort();
  const models = [...new Set(data.map(d => d.model))].sort();
  let maxTokens = 0;

  const buckets = {};
  for (const d of data) {
    const key = d.date + '|' + d.model;
    buckets[key] = (buckets[key] || 0) + d.total_tokens;
    maxTokens = Math.max(maxTokens, buckets[key] || 0);
  }
  const stacked = {};
  for (const d of dates) stacked[d] = 0;

  const pad = 32, top = 16, bottom = 28;
  const chartW = w - pad * 2, chartH = h - top - bottom;
  const barW = Math.max(4, Math.min(24, (chartW / dates.length) * 0.8));
  const gap = Math.max(1, (chartW / dates.length) - barW);

  for (let i = 0; i < models.length; i++) {
    const model = models[i];
    ctx.fillStyle = modelColor(model, i);
    for (let j = 0; j < dates.length; j++) {
      const val = buckets[dates[j] + '|' + model] || 0;
      if (val === 0) continue;
      const x = pad + j * (barW + gap);
      const barH = (val / maxTokens) * chartH;
      const y = h - bottom - stacked[dates[j]] - barH;
      ctx.fillRect(x, y, barW, barH);
      stacked[dates[j]] += barH;
    }
  }

  ctx.fillStyle = '#8b949e';
  ctx.font = '0.65rem system-ui';
  ctx.textAlign = 'center';
  for (let j = 0; j < dates.length; j += Math.max(1, Math.floor(dates.length / 12))) {
    const x = pad + j * (barW + gap) + barW/2;
    const label = dates[j].slice(5);
    ctx.fillText(label, x, h - 6);
  }

  ctx.strokeStyle = '#21262d';
  ctx.beginPath();
  ctx.moveTo(pad, top);
  ctx.lineTo(pad, h - bottom);
  ctx.stroke();

  ctx.fillStyle = '#8b949e';
  ctx.font = '0.6rem system-ui';
  ctx.textAlign = 'right';
  for (let v = 0; v <= maxTokens; v += Math.max(1, Math.round(maxTokens / 4))) {
    const y = h - bottom - (v / maxTokens) * chartH;
    ctx.fillText(v >= 1000 ? Math.round(v/1000) + 'k' : v, pad - 4, y + 3);
    ctx.strokeStyle = '#21262d';
    ctx.beginPath();
    ctx.moveTo(pad, y);
    ctx.lineTo(w - pad, y);
    ctx.stroke();
  }

  document.getElementById('chart-legend').innerHTML = models.map((m, i) =>
    `<span><span style="background:${modelColor(m,i)}"></span>${m}</span>`
  ).join('');
}

async function load() {
  try {
    const [stats, cost, sessions, timeline] = await Promise.all([
      fetchJSON('/api/stats?since=30d'),
      fetchJSON('/api/cost?since=30d'),
      fetchJSON('/api/sessions?since=30d&limit=20'),
      fetchJSON('/api/stats/timeline?since=30d&granularity=day')
    ]);

    const totalCost = cost.total_usd || 0;
    document.getElementById('cost-value').textContent = '$' + fmtUSD(totalCost);
    document.getElementById('cost-projected').textContent =
      timeline && timeline.length > 0
        ? '~$' + fmtUSD(totalCost / Math.max(1, new Set(timeline.map(t => t.date)).size) * 30) + ' projected this month'
        : 'no data for projection';

    const avgLat = stats.reduce((s, r) => s + r.avg_latency_ms * r.requests, 0) / Math.max(1, stats.reduce((s, r) => s + r.requests, 0));
    document.getElementById('latency-summary').innerHTML =
      avgLat > 0 ? `<div class="cost-total">${fmtMs(avgLat)}</div><div class="cost-projected">avg latency</div>` : '';

    drawChart(document.getElementById('chart'), timeline);

    const maxTokens = Math.max(1, ...stats.map(s => s.total_tokens));
    document.getElementById('stats-table').querySelector('tbody').innerHTML = stats.map(s => {
      const pct = s.total_tokens / maxTokens;
      const w = Math.max(2, Math.round(pct * 80));
      return `<tr>
        <td><span style="display:inline-block;width:${w}px;height:0.6rem;background:${modelColor(s.model, stats.indexOf(s))};border-radius:2px;vertical-align:middle;margin-right:0.4rem;"></span>${s.model} <span class="tag">${s.endpoint}</span></td>
        <td class="num">${s.requests}</td>
        <td class="num">${s.prompt_tokens.toLocaleString()}</td>
        <td class="num">${s.cached_input_tokens.toLocaleString()}</td>
        <td class="num">${s.cache_write_tokens.toLocaleString()}</td>
        <td class="num">${s.completion_tokens.toLocaleString()}</td>
        <td class="num">${s.total_tokens.toLocaleString()}</td>
        <td class="num">${fmtMs(s.avg_latency_ms)}</td>
      </tr>`;
    }).join('');

    const costRows = cost.rows || [];
    document.getElementById('cost-table').querySelector('tbody').innerHTML = costRows.map(r => {
      let tags = '';
      if (r.fallback) tags += '<span class="tag fb">fallback</span> ';
      if (r.not_billed) tags += '<span class="tag nb">not billed</span> ';
      return `<tr>
        <td>${r.model} <span class="tag">${r.endpoint}</span> ${tags}</td>
        <td class="num">$${fmtUSD(r.input_usd)}</td>
        <td class="num">$${fmtUSD(r.cached_input_usd)}</td>
        <td class="num">$${fmtUSD(r.cache_write_usd)}</td>
        <td class="num">$${fmtUSD(r.output_usd)}</td>
        <td class="num">$${fmtUSD(r.total_usd)}</td>
      </tr>`;
    }).join('');

    document.getElementById('sessions-table').querySelector('tbody').innerHTML = sessions.map(s =>
      `<tr>
        <td>${new Date(s.started_at).toLocaleString()}</td>
        <td class="num">${fmtDur((new Date(s.ended_at) - new Date(s.started_at))/1000)}</td>
        <td>${s.project || '—'}</td>
        <td class="num">${s.request_count}</td>
        <td class="num">${s.token_count.toLocaleString()}</td>
        <td class="num">—</td>
      </tr>`
    ).join('');

    document.getElementById('updated').textContent = 'Updated ' + new Date().toLocaleTimeString();
  } catch (e) {
    document.getElementById('cost-value').textContent = 'Error';
    document.getElementById('cost-projected').textContent = e.message;
  }
}

load();
setInterval(load, 30000);
</script>
</body>
</html>
