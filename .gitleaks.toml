title = "copilot-monitor gitleaks config"

[allowlist]
  description = "global allowlist"
  paths = [
    '''.devenv/''',
    '''.firecrawl/''',
    '''node_modules/''',
    '''vendor/''',
    '''\.pnpm/''',
  ]

